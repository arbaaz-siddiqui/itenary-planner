# Render.com deployment — WhatsApp service
#
# Push to the connected branch; Render builds + deploys automatically.

services:
  - type: web
    name: itinerary-planner-whatsapp
    env: python
    region: singapore
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn surfaces.whatsapp_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: WHATSAPP_DB_PATH
        value: /var/data/whatsapp_state.db
      - key: LLM_PROVIDER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        sync: false
      - key: OPENROUTER_BASE_URL
        sync: false
      - key: ACTIVITYLINKER_BASE_URL
        sync: false
      - key: ACTIVITYLINKER_TOKEN
        sync: false
      - key: ACTIVITYLINKER_TENANT_ID
        sync: false
      - key: ACTIVITYLINKER_INTRA_SECRET_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
    disk:
      name: whatsapp-state
      mountPath: /var/data
      sizeGB: 1
